name: tree-docs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Non-gating companion to the docs-vs-tree lint (LLD W-85).
# Reports drift between AGENTS.md and the real tree but never blocks merges.
jobs:
  check-tree-docs:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d466c  # v5
        with:
          python-version: "3.12"
      - name: Run docs-vs-tree linter (non-blocking)
        run: python3 scripts/check_tree_docs.py
        continue-on-error: true
